<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تشغيل الكوفيهات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#1B1310;
    --surface:#241A15;
    --surface-2:#2E2119;
    --surface-3:#3A2A20;
    --border:#4A382C;
    --text:#F3E9DD;
    --text-muted:#B8A392;
    --accent:#C9973F;
    --accent-2:#E3B564;
    --accent-soft:rgba(201,151,63,.15);
    --mint:#7FA687;
    --mint-soft:rgba(127,166,135,.15);
    --danger:#D9694B;
    --danger-soft:rgba(217,105,75,.15);
    --info:#7BA7BC;
    --info-soft:rgba(123,167,188,.15);
    --muted-badge:#8C7C6C;
    --radius:14px;
    --sidebar-w:250px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.brand,.nav-label,.card-title,.modal-title{font-family:'El Messiri',serif;}
  ::selection{background:var(--accent-soft);}
  .app{display:flex;min-height:100vh;}
 
  /* SIDEBAR */
  .sidebar{
    width:var(--sidebar-w);
    background:linear-gradient(180deg,var(--surface) 0%, #1F1611 100%);
    border-left:1px solid var(--border);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;overflow-y:auto;
    flex-shrink:0;
    transition:margin-right .25s ease;
    z-index:50;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:22px 18px 16px;border-bottom:1px solid var(--border);
  }
  .brand-mark{
    width:36px;height:36px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent) 60%, #8a6a2c 100%);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .brand-text{display:flex;flex-direction:column;line-height:1.15;}
  .brand-text b{font-size:16px;font-weight:700;color:var(--text);}
  .brand-text span{font-size:11px;color:var(--text-muted);font-family:'Tajawal';}
 
  .nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1;}
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:10px;cursor:pointer;
    color:var(--text-muted);font-size:14px;font-weight:500;
    border:1px solid transparent;
    position:relative;
    transition:background .15s, color .15s;
  }
  .nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
  .nav-item:hover{background:var(--surface-2);color:var(--text);}
  .nav-item.active{
    background:var(--accent-soft);color:var(--accent-2);
    border-color:rgba(201,151,63,.35);
  }
  .nav-item.active::before{
    content:"";position:absolute;right:-10px;top:50%;transform:translateY(-50%);
    width:8px;height:8px;border-radius:50% 50% 50% 0;rotate:45deg;
    background:var(--accent);
  }
  .nav-badge{
    margin-inline-start:auto;background:var(--danger);color:#fff;
    font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;
  }
  .nav-section-label{font-size:11px;color:var(--text-muted);opacity:.6;padding:14px 12px 4px;letter-spacing:.5px;}
 
  .sidebar-foot{padding:14px;border-top:1px solid var(--border);}
  .reset-btn{
    width:100%;padding:9px;border-radius:10px;border:1px dashed var(--border);
    background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:'Tajawal';
  }
  .reset-btn:hover{border-color:var(--danger);color:var(--danger);}
 
  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    position:sticky;top:0;background-color:var(--bg);z-index:40;
  }
  .topbar h1{font-size:21px;margin:0;font-weight:600;color:var(--text);}
  .topbar .sub{font-size:12.5px;color:var(--text-muted);margin-top:2px;font-family:'Tajawal';}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .today-pill{
    font-size:12.5px;color:var(--accent-2);background:var(--accent-soft);
    padding:7px 12px;border-radius:20px;border:1px solid rgba(201,151,63,.3);
  }
  .hamburger{display:none;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);width:36px;height:36px;cursor:pointer;font-size:16px;}
 
  .content{padding:22px 26px 60px;flex:1;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
 
  /* CARDS / GRID */
  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}
  @media(max-width:640px){.grid-4{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr;}}
 
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;
  }
  .kpi-card{display:flex;align-items:center;gap:14px;}
  .ring{
    --pct:0;width:58px;height:58px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--pct)*1%), var(--surface-3) 0);
    display:flex;align-items:center;justify-content:center;
  }
  .ring-inner{width:44px;height:44px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent-2);}
  .kpi-label{font-size:12.5px;color:var(--text-muted);margin-bottom:4px;}
  .kpi-value{font-size:22px;font-weight:700;color:var(--text);}
  .kpi-value.small{font-size:17px;}
 
  .card-title{font-size:15px;font-weight:600;margin:0 0 14px;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
  .card-title small{font-size:11.5px;color:var(--text-muted);font-weight:400;font-family:'Tajawal';}
 
  .list-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .list-row:last-child{border-bottom:none;}
  .list-row .t1{color:var(--text);font-weight:500;}
  .list-row .t2{color:var(--text-muted);font-size:12px;}
 
  /* BUTTONS */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 16px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--text);font-size:13.5px;font-weight:500;
    cursor:pointer;font-family:'Tajawal';transition:.15s;
  }
  .btn:hover{border-color:var(--accent);}
  .btn-primary{background:linear-gradient(180deg,var(--accent-2),var(--accent));color:#241A15;border:none;font-weight:700;}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px;}
  .btn-danger-ghost{color:var(--danger);border-color:rgba(217,105,75,.4);background:transparent;}
  .btn-sm{padding:6px 10px;font-size:12px;}
 
  /* TABLES */
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px;}
  thead th{
    text-align:right;padding:12px 14px;background:var(--surface-2);
    color:var(--text-muted);font-weight:600;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;
  }
  tbody td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--surface-2);}
  .row-actions{display:flex;gap:6px;}
  .empty-state{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13.5px;}
  .empty-state b{display:block;color:var(--text);font-size:15px;margin-bottom:4px;font-family:'El Messiri';}
 
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;}
  .badge-ok{background:var(--mint-soft);color:var(--mint);}
  .badge-warn{background:var(--accent-soft);color:var(--accent-2);}
  .badge-danger{background:var(--danger-soft);color:var(--danger);}
  .badge-info{background:var(--info-soft);color:var(--info);}
  .badge-muted{background:rgba(140,124,108,.18);color:var(--muted-badge);}
 
  .section-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .section-toolbar h2{margin:0;font-size:19px;font-weight:600;}
  .section-toolbar p{margin:2px 0 0;font-size:12.5px;color:var(--text-muted);font-family:'Tajawal';}
 
  /* KANBAN */
  .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:900px){.kanban{grid-template-columns:1fr;}}
  .kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;min-height:200px;}
  .kanban-col h3{font-size:13.5px;margin:2px 6px 12px;display:flex;align-items:center;gap:8px;color:var(--text);}
  .kanban-col h3 .dot{width:8px;height:8px;border-radius:50%;}
  .kcard{
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:11px 12px;margin-bottom:9px;cursor:grab;font-size:13px;
  }
  .kcard:active{cursor:grabbing;}
  .kcard .kt{font-weight:600;color:var(--text);margin-bottom:5px;}
  .kcard .kd{font-size:11.5px;color:var(--text-muted);margin-bottom:8px;}
  .kcard .kmeta{display:flex;align-items:center;justify-content:space-between;}
  .kcard .kmove{display:flex;gap:4px;}
  .kcard .kmove button{background:var(--surface-3);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;width:22px;height:22px;font-size:11px;cursor:pointer;}
  .kanban-col.dragover{outline:2px dashed var(--accent);}
 
  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(10,7,5,.65);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:22px;}
  .modal-title{font-size:17px;margin:0 0 16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;color:var(--text-muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--text);font-family:'Tajawal';font-size:13.5px;
  }
  .field textarea{resize:vertical;min-height:64px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;justify-content:center;}
 
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface-3);border:1px solid var(--accent);color:var(--text);
    padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:200;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
 
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;}
  .loading-screen .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--surface-3);border-top-color:var(--accent);animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
 
  .chart-box{height:230px;position:relative;}
 
  @media(max-width:900px){
    .sidebar{position:fixed;right:0;top:0;margin-right:calc(-1*var(--sidebar-w));box-shadow:0 0 40px rgba(0,0,0,.5);}
    .sidebar.open{margin-right:0;}
    .hamburger{display:flex;align-items:center;justify-content:center;}
    .content{padding:16px;}
    .topbar{padding:14px 16px;}
  }
</style>
</head>
<body>
 
<div class="loading-screen" id="loadingScreen">
  <div class="spin"></div>
  <div style="color:var(--text-muted);font-size:13px;">جاري تحميل بيانات الفروع...</div>
</div>
 
<div class="app" id="app" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 9h13a3 3 0 0 1 0 6h-1M4 9v6a4 4 0 0 0 4 4h5a4 4 0 0 0 4-4v-1M4 9V7a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v2" stroke="#241A15" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="brand-text"><b>لوحة التشغيل</b><span>سلسلة كوفيهات</span></div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="sidebar-foot">
      <button class="reset-btn" onclick="confirmResetAll()">↺ إعادة ضبط جميع البيانات</button>
    </div>
  </aside>
 
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div>
          <h1 id="pageTitle">لوحة المؤشرات</h1>
          <div class="sub" id="pageSub">نظرة عامة على أداء الفروع اليوم</div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="today-pill" id="todayPill"></span>
      </div>
    </div>
 
    <div class="content" id="content"></div>
  </div>
</div>
 
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>
 
<script>
/* =========================================================
   DATA / STATE
========================================================= */
const SHARED = false; // private data — visible only to you
const HAS_CLAUDE_STORAGE = (typeof window !== 'undefined' && !!window.storage);
const state = {};
let sidebarOpen = false;
 
const ICONS = {
  dashboard:`<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="5" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="12" width="7" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="16" width="7" height="5" rx="2" stroke="currentColor" stroke-width="1.6"/></svg>`,
  tasks:`<svg viewBox="0 0 24 24" fill="none"><path d="M9 11l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.6"/></svg>`,
  employees:`<svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="17" cy="8" r="2.4" stroke="currentColor" stroke-width="1.4"/><path d="M15.5 14.6c2.6.3 4.5 2.3 4.5 5.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`,
  inventory:`<svg viewBox="0 0 24 24" fill="none"><path d="M3 8l9-5 9 5-9 5-9-5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 8v8l9 5 9-5V8M12 13v8" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>`,
  suppliers:`<svg viewBox="0 0 24 24" fill="none"><path d="M3 7h11v9H3zM14 10h4l3 3v3h-7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="7" cy="18" r="1.8" stroke="currentColor" stroke-width="1.4"/><circle cx="17.5" cy="18" r="1.8" stroke="currentColor" stroke-width="1.4"/></svg>`,
  purchase:`<svg viewBox="0 0 24 24" fill="none"><path d="M4 6h2l1.6 9.6a2 2 0 0 0 2 1.7h7a2 2 0 0 0 2-1.6L20 8H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="21" r="1.3" fill="currentColor"/><circle cx="17" cy="21" r="1.3" fill="currentColor"/></svg>`,
  finance:`<svg viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M21 19H3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`,
  meetings:`<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`,
  branches:`<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="9.5" r="2.4" stroke="currentColor" stroke-width="1.4"/></svg>`,
  menu:`<svg viewBox="0 0 24 24" fill="none"><path d="M6 3v18M6 3c-2 0-2 5 0 6M18 3v18M18 3a3 3 0 0 0-3 3v3a3 3 0 0 0 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  maintenance:`<svg viewBox="0 0 24 24" fill="none"><path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 1 5.4-5.4l-2.6 2.6-2-2 2.6-2.6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
  checklist:`<svg viewBox="0 0 24 24" fill="none"><path d="M9 11l1.5 1.5L14 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M9 17h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`,
  complaints:`<svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 16.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M10.3 4.5a2 2 0 0 1 3.4 0l7.6 13a2 2 0 0 1-1.7 3H4.4a2 2 0 0 1-1.7-3l7.6-13Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>`,
};
 
const MODULES = {
  branches:{
    key:'branches', title:'الفروع', icon:ICONS.branches, addLabel:'إضافة فرع',
    fields:[
      {key:'name',label:'اسم الفرع',type:'text',required:true},
      {key:'location',label:'الموقع / الحي',type:'text'},
      {key:'manager',label:'مدير الفرع',type:'text'},
      {key:'phone',label:'رقم الجوال',type:'text'},
    ],
    columns:[
      {label:'اسم الفرع',render:r=>`<b>${esc(r.name)}</b>`},
      {label:'الموقع',render:r=>esc(r.location||'—')},
      {label:'مدير الفرع',render:r=>esc(r.manager||'—')},
      {label:'الجوال',render:r=>esc(r.phone||'—')},
    ]
  },
  employees:{
    key:'employees', title:'الموظفون', icon:ICONS.employees, addLabel:'إضافة موظف',
    fields:[
      {key:'name',label:'اسم الموظف',type:'text',required:true},
      {key:'role',label:'الوظيفة',type:'text'},
      {key:'branchId',label:'الفرع',type:'select',source:'branches'},
      {key:'phone',label:'رقم الجوال',type:'text'},
      {key:'salary',label:'الراتب (ر.س)',type:'number'},
    ],
    columns:[
      {label:'الاسم',render:r=>`<b>${esc(r.name)}</b>`},
      {label:'الوظيفة',render:r=>esc(r.role||'—')},
      {label:'الفرع',render:r=>esc(nameOf('branches',r.branchId))},
      {label:'الجوال',render:r=>esc(r.phone||'—')},
      {label:'الراتب',render:r=>r.salary?fmt(r.salary)+' ر.س':'—'},
    ]
  },
  attendance:{
    key:'attendance', title:'الحضور والانصراف', icon:null, addLabel:'تسجيل حضور',
    fields:[
      {key:'employeeId',label:'الموظف',type:'select',source:'employees',required:true},
      {key:'date',label:'التاريخ',type:'date',required:true,default:()=>todayStr()},
      {key:'status',label:'الحالة',type:'select',options:['حاضر','متأخر','غائب','إجازة']},

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmt(n){n=Number(n||0);return n.toLocaleString('en-US',{maximumFractionDigits:2});}
function esc(s){if(s===undefined||s===null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function truncate(s,n){if(!s)return'—';return s.length>n?s.slice(0,n)+'…':s;}
function nameOf(collectionKey,id){
  const arr=state[collectionKey]||[];
  const item=arr.find(x=>x.id===id);
  if(!item)return'—';
  return item.name||item.title||'—';
}
function badge(text,cls){return `<span class="badge badge-${cls}">${esc(text)}</span>`;}
function badgeFor(mapKey,value){
  if(!value)return'—';
  const cls=(BADGE_MAPS[mapKey]&&BADGE_MAPS[mapKey][value])||'muted';
  return badge(value,cls);
}

  const t=document.getElementById('toast');

const ALL_KEYS = Object.keys(MODULES).concat(['tasks']);
 
// Works two ways:
// 1) Inside Claude.ai (as an artifact) -> uses window.storage, private to you (SHARED=false)
// 2) Saved and opened directly as a file in any browser -> falls back to that browser's
//    localStorage automatically, so your data still persists on your device.
async function storageGet(key){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.get(key, SHARED); }catch(e){ return null; }
  }
  try{
    const v = localStorage.getItem(key);
    return v!==null ? {value:v} : null;
  }catch(e){ return null; }
}
async function storageSet(key,value){
  if(HAS_CLAUDE_STORAGE){
    try{ return await window.storage.set(key, value, SHARED); }catch(e){ return null; }
  }
  try{ localStorage.setItem(key,value); return {value}; }catch(e){ return null; }
}
 
async function loadAll(){
  await Promise.all(ALL_KEYS.map(async k=>{
    try{
      const res = await storageGet('coffee-ops:'+k);
      state[k] = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      state[k] = [];
    }
  }));
  seedIfEmpty();
}
 
async function persist(k){
  try{
    await storageSet('coffee-ops:'+k, JSON.stringify(state[k]||[]));
  }catch(e){
    console.error('storage error',e);
    toast('تعذر حفظ البيانات، حاول مجدداً');
  }
}

function buildNav(){
  const nav=document.getElementById('navList');
  let html='';
  NAV_ORDER.forEach(item=>{
    if(item.section) html+=`<div class="nav-section-label">${item.section}</div>`;
    const icon = item.icon==='clock' ? `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>` : item.icon;
    html+=`<div class="nav-item" data-tab="${item.key}" onclick="showTab('${item.key}')">${icon}<span>${item.label}</span><span class="nav-badge" id="badge-${item.key}" style="display:none;"></span></div>`;
  });
  nav.innerHTML=html;
}
 
function showTab(key){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===key));
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.toggle('active',el.id==='panel-'+key));
  const titleMap = {dashboard:['لوحة المؤشرات','نظرة عامة على أداء الفروع اليوم']};
  const nav = NAV_ORDER.find(n=>n.key===key);
  const [t,s] = titleMap[key] || [nav?nav.label:'', 'إدارة و متابعة البيانات'];
  document.getElementById('pageTitle').textContent = t;
  document.getElementById('pageSub').textContent = s;
  if(sidebarOpen){toggleSidebar();}
  renderTab(key);
}
 
function renderTab(key){
  if(key==='dashboard'){renderDashboard();return;}
  if(key==='tasks'){renderTasks();return;}
  renderGenericModule(key);
}

    panel.className='tab-panel';
    panel.id='panel-'+key;
    document.getElementById('content').appendChild(panel);
  }
  return panel;
}
 
function renderGenericModule(key){
  const cfg=MODULES[key];
  const panel=ensurePanel(key);
  const rows=state[key]||[];
  panel.innerHTML=`
    <div class="section-toolbar">
      <div><h2>${cfg.title}</h2><p>${rows.length} سجل${rows.length===1?'':''}</p></div>
      <button class="btn btn-primary" onclick="openModal('${key}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        ${cfg.addLabel}
      </button>
    </div>
    <div class="table-wrap">
      ${rows.length===0 ? emptyState(cfg.title) : `
      <table>
        <thead><tr>${cfg.columns.map(c=>`<th>${c.label}</th>`).join('')}<th style="width:90px;">إجراءات</th></tr></thead>
        <tbody>
          ${rows.slice().reverse().map(r=>`
            <tr>
              ${cfg.columns.map(c=>`<td>${c.render(r)}</td>`).join('')}
              <td>
                <div class="row-actions">
                  <button class="btn btn-icon btn-sm" title="تعديل" onclick="openModal('${key}','${r.id}')">✎</button>
                  <button class="btn btn-icon btn-sm btn-danger-ghost" title="حذف" onclick="deleteRecord('${key}','${r.id}')">✕</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}
 
function emptyState(title){
  return `<div class="empty-state"><b>لا توجد بيانات بعد</b>ابدأ بإضافة أول سجل في «${title}»</div>`;
}
 
/* =========================================================
   MODAL / FORM
========================================================= */
let modalCtx = null; // {moduleKey, editId, isTask}
 
function fieldOptions(field){
  if(field.source){
    return (state[field.source]||[]).map(o=>({value:o.id,label:o.name||o.title}));
  }
  if(field.options){
    return field.options.map(o=>({value:o,label:o}));
  }
  return [];
}
 
function renderField(field,data){
  const val = data[field.key] !== undefined ? data[field.key] : (field.default ? field.default() : '');
  const req = field.required?'required':'';
  if(field.type==='select'){
    const opts=fieldOptions(field);
    return `<div class="field"><label>${field.label}</label>
      <select name="${field.key}" ${req}>
        <option value="">— اختر —</option>
        ${opts.map(o=>`<option value="${esc(o.value)}" ${String(o.value)===String(val)?'selected':''}>${esc(o.label)}</option>`).join('')}
      </select></div>`;
  }
  if(field.type==='textarea'){
    return `<div class="field"><label>${field.label}</label><textarea name="${field.key}" ${req}>${esc(val)}</textarea></div>`;
  }
  return `<div class="field"><label>${field.label}</label><input type="${field.type}" name="${field.key}" value="${esc(val)}" ${req}></div>`;
}
 
function openModal(moduleKey, editId=null, isTask=false){
  const cfg = isTask ? TASK_CONFIG : MODULES[moduleKey];
  const data = editId ? (state[isTask?'tasks':moduleKey].find(x=>x.id===editId) || {}) : {};
  modalCtx = {moduleKey: isTask?'tasks':moduleKey, editId, isTask};
  const title = editId ? `تعديل — ${isTask?'مهمة':MODULES[moduleKey]?.title||''}` : `${isTask?'مهمة جديدة':MODULES[moduleKey]?.addLabel||''}`;
  document.getElementById('modalBox').innerHTML=`
    <h3 class="modal-title">${title}</h3>
    <form id="modalForm">
      ${cfg.fields.map(f=>renderField(f,data)).join('')}
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>
  `;
  document.getElementById('modalForm').onsubmit=submitModal;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  modalCtx=null;
}
async function submitModal(e){
  e.preventDefault();
  const {moduleKey, editId, isTask} = modalCtx;
  const cfg = isTask ? TASK_CONFIG : MODULES[moduleKey];
  const fd = new FormData(e.target);
  const record = editId ? {...state[moduleKey].find(x=>x.id===editId)} : {id:uid()};
  cfg.fields.forEach(f=>{
    let v = fd.get(f.key);
    if(f.type==='number') v = v===''? null : Number(v);
    record[f.key]=v;
  });
  if(!record.status && cfg.fields.some(f=>f.key==='status' && f.options)){
    const sf=cfg.fields.find(f=>f.key==='status');
    record.status = sf.options[0];
  }
  if(editId){
    const idx=state[moduleKey].findIndex(x=>x.id===editId);
    state[moduleKey][idx]=record;
  }else{
    state[moduleKey].push(record);
  }
  await persist(moduleKey);
  closeModal();
  toast('تم الحفظ بنجاح');
  renderTab(document.querySelector('.nav-item.active')?.dataset.tab || (isTask?'tasks':moduleKey));
  updateBadges();
}
async function deleteRecord(moduleKey,id){
  if(!confirm('هل تريد حذف هذا السجل؟')) return;
  state[moduleKey]=state[moduleKey].filter(x=>x.id!==id);
  await persist(moduleKey);
  toast('تم الحذف');
  renderTab(moduleKey);
  updateBadges();
}
 
/* =========================================================
   TASKS (KANBAN)
========================================================= */
const TASK_STATUSES=[
  {key:'قيد الانتظار',color:'var(--muted-badge)'},
  {key:'قيد التنفيذ',color:'var(--accent)'},
  {key:'مكتمل',color:'var(--mint)'},
];
 
function renderTasks(){
  const panel=ensurePanel('tasks');
  const tasks=state.tasks||[];
  panel.innerHTML=`
    <div class="section-toolbar">
      <div><h2>المهام والمشاريع</h2><p>${tasks.length} مهمة إجمالاً — اسحب البطاقة أو استخدم الأسهم لتغيير الحالة</p></div>
      <button class="btn btn-primary" onclick="openModal(null,null,true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        مهمة جديدة
      </button>
    </div>
    <div class="kanban">
      ${TASK_STATUSES.map(s=>{
        const items=tasks.filter(t=>(t.status||'قيد الانتظار')===s.key);
        return `
        <div class="kanban-col" data-status="${s.key}" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="onDropTask(event,'${s.key}')">
          <h3><span class="dot" style="background:${s.color}"></span>${s.key} <span style="color:var(--text-muted);font-weight:400;">(${items.length})</span></h3>
          ${items.length===0?`<div style="color:var(--text-muted);font-size:12px;padding:10px 4px;">لا توجد مهام</div>`:''}
          ${items.slice().reverse().map(t=>renderTaskCard(t)).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}
function renderTaskCard(t){
  const idx=TASK_STATUSES.findIndex(s=>s.key===t.status);
  const prev=TASK_STATUSES[idx-1], next=TASK_STATUSES[idx+1];
  return `
    <div class="kcard" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${t.id}')">
      <div class="kt">${esc(t.title)}</div>
      ${t.description?`<div class="kd">${esc(truncate(t.description,60))}</div>`:''}
      <div class="kmeta">
        <div style="display:flex;gap:6px;align-items:center;">
          ${badgeFor('priority',t.priority)}
          ${t.dueDate?`<span style="font-size:11px;color:var(--text-muted);">📅 ${esc(t.dueDate)}</span>`:''}
        </div>
        <div class="kmove">
          ${prev?`<button title="نقل للخلف" onclick="moveTask('${t.id}','${prev.key}')">‹</button>`:''}
          ${next?`<button title="نقل للأمام" onclick="moveTask('${t.id}','${next.key}')">›</button>`:''}
          <button title="تعديل" onclick="openModal(null,'${t.id}',true)">✎</button>
          <button title="حذف" onclick="deleteRecord('tasks','${t.id}')">✕</button>
        </div>
      </div>
      ${t.assignee?`<div class="kd" style="margin-top:6px;margin-bottom:0;">👤 ${esc(t.assignee)} ${t.branchId?(' • '+esc(nameOf('branches',t.branchId))):''}</div>`:''}
    </div>
  `;
}
async function moveTask(id,newStatus){
  const t=state.tasks.find(x=>x.id===id);
  if(!t)return;
  t.status=newStatus;
  await persist('tasks');
  renderTasks();
  updateBadges();
}
async function onDropTask(e,status){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const id=e.dataTransfer.getData('text/plain');
  await moveTask(id,status);
}
 
/* =========================================================
   DASHBOARD
========================================================= */
let salesChartInstance=null, taskChartInstance=null;
 
function renderDashboard(){
  const panel=ensurePanel('dashboard');
  const branches=state.branches||[];
  const employees=state.employees||[];
  const attendance=state.attendance||[];
  const inventory=state.inventory||[];
  const tasks=state.tasks||[];
  const finance=state.finance||[];
  const meetings=state.meetings||[];
  const complaints=state.complaints||[];
 
  const today=todayStr();
  const todayAttendance=attendance.filter(a=>a.date===today);
  const presentToday=todayAttendance.filter(a=>a.status==='حاضر').length;
  const attendanceRate = employees.length? Math.round((presentToday/employees.length)*100) : 0;
 
  const todayFinance=finance.filter(f=>f.date===today);
  const todayRevenue=todayFinance.reduce((s,f)=>s+Number(f.revenue||0),0);
  const todayExpenses=todayFinance.reduce((s,f)=>s+Number(f.expenses||0),0);
 
  const lowStock=inventory.filter(i=>Number(i.quantity)<=Number(i.reorderLevel||0));
  const tasksToday=tasks.filter(t=>t.dueDate===today && t.status!=='مكتمل');
  const overdue=tasks.filter(t=>t.dueDate && t.dueDate<today && t.status!=='مكتمل');
  const openComplaints=complaints.filter(c=>c.status!=='تم الحل');
  const upcomingMeetings=meetings.filter(m=>m.date>=today).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,4);
 
  const doneTasks=tasks.filter(t=>t.status==='مكتمل').length;
  const taskCompletionPct = tasks.length ? Math.round((doneTasks/tasks.length)*100) : 0;
 
  panel.innerHTML=`
    <div class="grid grid-4" style="margin-bottom:16px;">
      ${kpiCard('إيراد اليوم', fmt(todayRevenue)+' ر.س', Math.min(100,Math.round((todayRevenue/(todayRevenue+todayExpenses||1))*100)))}
      ${kpiCard('نسبة الحضور اليوم', attendanceRate+'%', attendanceRate)}
      ${kpiCard('إنجاز المهام', taskCompletionPct+'%', taskCompletionPct)}
      ${kpiCard('أصناف منخفضة المخزون', lowStock.length, Math.min(100, lowStock.length*20), lowStock.length>0?'var(--danger)':'var(--mint)')}
    </div>
 
    <div class="grid grid-2" style="margin-bottom:16px;">
      <div class="card">
        <h3 class="card-title">أداء المبيعات <small>آخر 7 أيام (كل الفروع)</small></h3>
        <div class="chart-box"><canvas id="salesChart"></canvas></div>
      </div>
      <div class="card">
        <h3 class="card-title">المهام حسب الحالة</h3>
        <div class="chart-box"><canvas id="taskChart"></canvas></div>
      </div>
    </div>
 
    <div class="grid grid-3">
      <div class="card">
        <h3 class="card-title">مهام مستحقة اليوم / متأخرة <small>${tasksToday.length+overdue.length}</small></h3>
        ${(tasksToday.length+overdue.length)===0?`<div class="empty-state" style="padding:16px 4px;">لا توجد مهام مستحقة 🎉</div>`:
          [...overdue.map(t=>({...t,late:true})),...tasksToday].map(t=>`
            <div class="list-row"><div><div class="t1">${esc(t.title)}</div><div class="t2">${esc(t.assignee||'—')}</div></div>${t.late?badge('متأخرة','danger'):badge('اليوم','warn')}</div>
          `).join('')}
      </div>
      <div class="card">
        <h3 class="card-title">تنبيهات المخزون <small>${lowStock.length}</small></h3>
        ${lowStock.length===0?`<div class="empty-state" style="padding:16px 4px;">المخزون في مستوى جيد ✅</div>`:
          lowStock.map(i=>`<div class="list-row"><div><div class="t1">${esc(i.name)}</div><div class="t2">${fmt(i.quantity)} ${esc(i.unit||'')} متبقية</div></div>${badge('أعد الطلب','danger')}</div>`).join('')}
      </div>
      <div class="card">
        <h3 class="card-title">مواعيد قادمة <small>${upcomingMeetings.length}</small></h3>
        ${upcomingMeetings.length===0?`<div class="empty-state" style="padding:16px 4px;">لا توجد مواعيد قادمة</div>`:
          upcomingMeetings.map(m=>`<div class="list-row"><div><div class="t1">${esc(m.title)}</div><div class="t2">${esc(nameOf('branches',m.branchId))}</div></div><div class="t2">${esc(m.date)} ${esc(m.time||'')}</div></div>`).join('')}
      </div>
    </div>
 
    ${openComplaints.length>0?`
    <div class="card" style="margin-top:16px;">
      <h3 class="card-title">شكاوى مفتوحة تحتاج متابعة <small>${openComplaints.length}</small></h3>
      ${openComplaints.slice(0,5).map(c=>`<div class="list-row"><div><div class="t1">${esc(nameOf('branches',c.branchId))}</div><div class="t2">${esc(truncate(c.issue,70))}</div></div>${badgeFor('complaints',c.status)}</div>`).join('')}
    </div>`:''}
  `;
 
  renderCharts(finance, tasks);
}
 
function kpiCard(label,value,pct,color){
  return `
    <div class="card kpi-card">
      <div class="ring" style="--pct:${pct}; ${color?`background:conic-gradient(${color} calc(var(--pct)*1%), var(--surface-3) 0);`:''}">
        <div class="ring-inner">${pct}%</div>
      </div>
      <div>
        <div class="kpi-label">${label}</div>
        <div class="kpi-value ${String(value).length>8?'small':''}">${value}</div>
      </div>
    </div>
  `;
}
 
function renderCharts(finance, tasks){
  const ctx1=document.getElementById('salesChart');
  const ctx2=document.getElementById('taskChart');
  if(!ctx1 || !ctx2 || typeof Chart==='undefined') return;
 
  const days=[...Array(7)].map((_,i)=>offsetDate(-(6-i)));
  const revByDay=days.map(d=>finance.filter(f=>f.date===d).reduce((s,f)=>s+Number(f.revenue||0),0));
  const expByDay=days.map(d=>finance.filter(f=>f.date===d).reduce((s,f)=>s+Number(f.expenses||0),0));
 
  if(salesChartInstance) salesChartInstance.destroy();
  salesChartInstance = new Chart(ctx1,{
    type:'line',
    data:{labels:days.map(d=>d.slice(5)),datasets:[
      {label:'الإيرادات',data:revByDay,borderColor:'#C9973F',backgroundColor:'rgba(201,151,63,.15)',fill:true,tension:.35},
      {label:'المصروفات',data:expByDay,borderColor:'#D9694B',backgroundColor:'rgba(217,105,75,.1)',fill:true,tension:.35},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#B8A392',font:{family:'Tajawal'}}}},
      scales:{
        x:{ticks:{color:'#B8A392'},grid:{color:'#3A2A20'}},
        y:{ticks:{color:'#B8A392'},grid:{color:'#3A2A20'}}
      }
    }
  });
 
  const statusCounts = TASK_STATUSES.map(s=>tasks.filter(t=>t.status===s.key).length);
  if(taskChartInstance) taskChartInstance.destroy();
  taskChartInstance = new Chart(ctx2,{
    type:'doughnut',
    data:{labels:TASK_STATUSES.map(s=>s.key),datasets:[{data:statusCounts,backgroundColor:['#8C7C6C','#C9973F','#7FA687'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#B8A392',font:{family:'Tajawal'},padding:14}}}}
  });
}
 
/* =========================================================
   BADGES ON SIDEBAR
========================================================= */
function updateBadges(){
  const lowStock=(state.inventory||[]).filter(i=>Number(i.quantity)<=Number(i.reorderLevel||0)).length;
  const openComplaints=(state.complaints||[]).filter(c=>c.status!=='تم الحل').length;
  const today=todayStr();
  const overdueTasks=(state.tasks||[]).filter(t=>t.dueDate && t.dueDate<today && t.status!=='مكتمل').length;
  setBadge('inventory',lowStock);
  setBadge('complaints',openComplaints);
  setBadge('tasks',overdueTasks);
}
function setBadge(key,n){
  const el=document.getElementById('badge-'+key);
  if(!el)return;
  if(n>0){el.style.display='inline-block';el.textContent=n;}else{el.style.display='none';}
}
 
/* =========================================================
   RESET
========================================================= */
async function confirmResetAll(){
  if(!confirm('سيتم حذف جميع البيانات المخزّنة نهائياً لكل المستخدمين. هل أنت متأكد؟'))return;
  for(const k of ALL_KEYS){
    state[k]=[];
    await persist(k);
  }
  toast('تمت إعادة الضبط');
  showTab('dashboard');
  updateBadges();
}
 
/* =========================================================
   INIT
========================================================= */
async function init(){
  buildNav();
  await loadAll();
  for(const k of ALL_KEYS) await persist(k); // ensure seed data is saved on first run
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('todayPill').textContent = 'اليوم: '+new Date().toLocaleDateString('ar-SA-u-nu-latn',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  showTab('dashboard');
  updateBadges();
}
init();
</script>
